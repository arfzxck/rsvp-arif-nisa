<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jemputan Perkahwinan – Arif & Nisa</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    body { font-family: 'Montserrat', sans-serif; margin:0; background:#fdf8f2; }

    .section { padding:40px 20px; max-width:700px; margin:auto; }

    .rsvp-card {
      background:#1a1209;
      padding:25px;
      border-radius:10px;
      color:white;
    }

    .form-group { margin-bottom:15px; }

    label {
      display:block;
      font-size:12px;
      letter-spacing:2px;
      margin-bottom:6px;
      color:#c59d5f;
      text-transform:uppercase;
    }

    input, select {
      width:100%;
      padding:10px;
      border-radius:5px;
      border:1px solid #c59d5f33;
      background:#ffffff10;
      color:white;
    }

    .btn {
      width:100%;
      padding:12px;
      background:linear-gradient(135deg,#9e7a3f,#c59d5f);
      border:none;
      color:#1a1209;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
      border-radius:5px;
    }

    .btn:disabled { opacity:0.6; }

    .success {
      display:none;
      margin-top:15px;
      padding:10px;
      background:#c59d5f22;
      border:1px solid #c59d5f55;
      color:#c59d5f;
      text-align:center;
      border-radius:5px;
    }

    .success.show { display:block; }
  </style>
</head>

<body>

<div class="section">
  <h2 style="text-align:center;">RSVP</h2>

  <div class="rsvp-card">
    <form id="rsvp-form">

      <div class="form-group">
        <label>Nama</label>
        <input type="text" id="rsvp-name" required />
      </div>

      <div class="form-group">
        <label>Pax</label>
        <input type="number" id="rsvp-pax" min="1" max="20" required />
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="rsvp-status" required>
          <option value="">Pilih</option>
          <option value="Hadir">Hadir</option>
          <option value="Tidak Hadir">Tidak Hadir</option>
        </select>
      </div>

      <button class="btn" id="rsvp-submit" type="submit">
        Hantar RSVP
      </button>

      <div class="success" id="rsvp-success">
        Terima kasih! RSVP anda telah diterima 💛
      </div>

    </form>
  </div>
</div>

<script>
const rsvpEndpoint = "https://script.google.com/macros/s/AKfycbyANp79fs2-BTk_hNdcga8q7Jqej-cvVPQS01cIhbUrw4Jc7BTPq2rxq2ez-5yDjPQ0/exec";

document.getElementById("rsvp-form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn = document.getElementById("rsvp-submit");

  const name = document.getElementById("rsvp-name").value.trim();
  const pax = document.getElementById("rsvp-pax").value.trim();
  const status = document.getElementById("rsvp-status").value;

  if (!name || !pax || !status) {
    alert("Sila lengkapkan semua maklumat");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Menghantar...";

  try {
    const res = await fetch(rsvpEndpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        pax,
        status
      })
    });

    const text = await res.text();
    console.log("Response:", text);

    document.getElementById("rsvp-success").classList.add("show");
    document.getElementById("rsvp-form").reset();

  } catch (err) {
    console.error(err);
    alert("RSVP gagal dihantar. Cuba lagi.");
  }

  btn.disabled = false;
  btn.innerText = "Hantar RSVP";
});
</script>

</body>
</html>
