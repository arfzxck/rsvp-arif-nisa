<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jemputan Perkahwinan – Arif & Nisa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

  <style>
    /* (YOUR ORIGINAL CSS KEPT EXACTLY AS IT IS) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c59d5f;
      --gold-light: #e8c98a;
      --gold-dark: #9e7a3f;
      --gold-bg: rgba(197,157,95,0.08);
      --white: #ffffff;
      --cream: #fdf8f2;
      --dark: #1a1209;
      --text: #3d2e1a;
      --text-muted: #7a6650;
      --border: rgba(197,157,95,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    /* 🔴 KEEP REST OF YOUR CSS EXACTLY (not shortened for readability) */
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <div class="header-bg"></div>
  <div class="header-overlay"></div>

  <div class="header-content">
    <p class="header-bismillah">Dengan nama Allah Yang Maha Pemurah lagi Maha Mengasihani</p>

    <div class="header-names">
      <em>Arif</em>
      <span class="header-amp">&amp;</span>
      <em>Nisa</em>
    </div>

    <p class="header-tagline">Walimatul Urus</p>
    <div class="header-date-badge">27 September 2026 · Ahad</div>
  </div>
</header>

<!-- ================= RSVP SECTION ================= -->
<section class="rsvp-section section">

  <div class="rsvp-card">

    <form id="rsvp-form">
      <div class="form-group">
        <label>Nama Penuh</label>
        <input type="text" id="rsvp-name" required />
      </div>

      <div class="form-group">
        <label>Bilangan Tetamu</label>
        <input type="number" id="rsvp-pax" min="1" max="20" required />
      </div>

      <div class="form-group">
        <label>Status</label>
        <select id="rsvp-status" required>
          <option value="">Pilih</option>
          <option value="Hadir">Hadir</option>
          <option value="Tidak Hadir">Tidak Hadir</option>
        </select>
      </div>

      <button class="btn btn-gold" id="rsvp-submit" type="submit">
        Hantar RSVP
      </button>
    </form>

    <div class="rsvp-success" id="rsvp-success">
      Terima kasih! RSVP anda telah diterima 💛
    </div>

  </div>
</section>

<!-- ================= FIREBASE CONFIG ================= -->
<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<!-- ================= MAIN SCRIPT ================= -->
<script>

document.getElementById("rsvp-form").addEventListener("submit", function(e) {
  e.preventDefault();

  const btn = document.getElementById("rsvp-submit");

  const name = document.getElementById("rsvp-name").value.trim();
  const pax = document.getElementById("rsvp-pax").value.trim();
  const status = document.getElementById("rsvp-status").value;

  if (!name || !pax || !status) return;

  btn.disabled = true;
  btn.textContent = "Menghantar...";

  db.collection("rsvp").add({
    name: name,
    pax: Number(pax),
    status: status,
    createdAt: new Date()
  })
  .then(() => {
    document.getElementById("rsvp-success").style.display = "block";
    btn.textContent = "Berjaya ✓";
    document.getElementById("rsvp-form").reset();
  })
  .catch((err) => {
    console.error(err);
    alert("Error menghantar RSVP");
    btn.disabled = false;
    btn.textContent = "Hantar RSVP";
  });
});

</script>

</body>
</html>
