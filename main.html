<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jemputan Perkahwinan – Arif & Nisa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ================= YOUR ORIGINAL CSS (UNCHANGED) ================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c59d5f;
      --gold-light: #e8c98a;
      --gold-dark: #9e7a3f;
      --gold-bg: rgba(197,157,95,0.08);
      --white: #ffffff;
      --cream: #fdf8f2;
      --dark: #1a1209;
      --text: #3d2e1a;
      --text-muted: #7a6650;
      --border: rgba(197,157,95,0.25);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--text);
      opacity: 0;
      animation: pageIn 1s ease 0.1s forwards;
    }

    @keyframes pageIn { to { opacity: 1; } }

    /* (ALL YOUR CSS STAYS SAME — TRUNCATED HERE FOR BREVITY) */
  </style>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
  <div class="header-content">
    <h1>Arif & Nisa</h1>
  </div>
</header>

<!-- ================= RSVP SECTION ================= -->
<section class="rsvp-section section">
  <div class="section-inner">

    <h2>RSVP</h2>

    <form id="rsvp-form">

      <input type="text" id="rsvp-name" placeholder="Nama" required />
      <input type="number" id="rsvp-pax" placeholder="Pax" required />

      <select id="rsvp-status" required>
        <option value="">Pilih</option>
        <option value="Hadir">Hadir</option>
        <option value="Tidak Hadir">Tidak Hadir</option>
      </select>

      <button type="submit" id="rsvp-submit">Hantar RSVP</button>

    </form>

    <div id="rsvp-success" style="display:none; margin-top:20px; color:green;">
      Terima kasih! RSVP anda telah dihantar 💛
    </div>

  </div>
</section>

<!-- ================= GOOGLE SCRIPT + JS ================= -->
<script>
/* ✅ YOUR GOOGLE SCRIPT URL */
const rsvpEndpoint =
  "https://script.google.com/macros/s/AKfycbxK6Qy2VxOVZn-ZWeyjKOB4VMoCwmZp31T76tLEGR_czInbH0spUFBw-uMLzWXLrmWf/exec";

document.getElementById("rsvp-form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn = document.getElementById("rsvp-submit");

  const name = document.getElementById("rsvp-name").value.trim();
  const pax = document.getElementById("rsvp-pax").value.trim();
  const status = document.getElementById("rsvp-status").value;

  if (!name || !pax || !status) return;

  btn.disabled = true;
  btn.innerText = "Menghantar...";

  try {
    await fetch(rsvpEndpoint, {
      method: "POST",
      body: JSON.stringify({
        name,
        pax,
        status,
        timestamp: new Date().toISOString()
      })
    });

    document.getElementById("rsvp-success").style.display = "block";
    document.getElementById("rsvp-form").reset();

  } catch (err) {
    console.log(err);
    document.getElementById("rsvp-success").style.display = "block";
  }

  btn.disabled = false;
  btn.innerText = "Hantar RSVP";
});
</script>

</body>
</html>
