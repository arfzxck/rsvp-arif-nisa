<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jemputan Perkahwinan – Arif & Nisa</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- ✅ Firebase COMPAT MODE (IMPORTANT FIX) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #fdf8f2;
      color: #3d2e1a;
    }

    header {
      padding: 40px;
      text-align: center;
      background: #1a1209;
      color: white;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #c59d5f;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .success {
      display: none;
      margin-top: 15px;
      padding: 10px;
      background: #e8c98a;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <h1>Arif & Nisa</h1>
  <p>RSVP Jemputan Perkahwinan</p>
</header>

<div class="container">

  <form id="rsvp-form">
    <label>Nama</label>
    <input type="text" id="rsvp-name" required />

    <label>Pax</label>
    <input type="number" id="rsvp-pax" min="1" required />

    <label>Status</label>
    <select id="rsvp-status" required>
      <option value="">Pilih</option>
      <option value="Hadir">Hadir</option>
      <option value="Tidak Hadir">Tidak Hadir</option>
    </select>

    <button id="rsvp-submit" type="submit">Hantar RSVP</button>
  </form>

  <div class="success" id="rsvp-success">
    Terima kasih! RSVP diterima 💛
  </div>

</div>

<!-- ✅ FIREBASE CONFIG -->
<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<!-- ✅ RSVP LOGIC -->
<script>
document.getElementById("rsvp-form").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn = document.getElementById("rsvp-submit");

  const name = document.getElementById("rsvp-name").value.trim();
  const pax = document.getElementById("rsvp-pax").value.trim();
  const status = document.getElementById("rsvp-status").value;

  if (!name || !pax || !status) return;

  btn.disabled = true;
  btn.textContent = "Menghantar...";

  try {
    await db.collection("rsvp").add({
      name,
      pax: Number(pax),
      status,
      createdAt: new Date()
    });

    document.getElementById("rsvp-success").style.display = "block";
    document.getElementById("rsvp-form").reset();
    btn.textContent = "Berjaya ✓";

  } catch (err) {
    console.error(err);
    alert("Gagal hantar RSVP");
    btn.disabled = false;
    btn.textContent = "Hantar RSVP";
  }
});
</script>

</body>
</html>
