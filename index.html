<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arif & Nisa – Walimatul Urus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      height: 100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: #1a1209;
      color: white;
      text-align:center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      margin-bottom: 10px;
    }

    .gold {
      color: #c59d5f;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 28px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg,#9e7a3f,#c59d5f,#e8c98a);
      color: #1a1209;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: 3px;
    }

    button:hover {
      transform: translateY(-2px);
      transition: 0.2s;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1><span class="gold">Arif</span> & Nisa</h1>
    <p>Walimatul Urus • 27 September 2026</p>

    <button onclick="openMain()">
      Buka Jemputan
    </button>
  </div>

  <script>
    function openMain() {
      window.location.href = "main.html";
    }
  </script>

</body>
</html>
