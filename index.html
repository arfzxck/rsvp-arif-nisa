<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP Arif & Nisa</title>
  <style>
    body {
      font-family: Arial;
      background: #f7f7f7;
      padding: 20px;
    }

    .card {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>RSVP Wedding</h2>

  <input type="text" id="name" placeholder="Name" required>

  <input type="number" id="pax" placeholder="Number of Pax" required>

  <select id="status">
    <option value="Hadir">Hadir</option>
    <option value="Tidak Hadir">Tidak Hadir</option>
  </select>

  <button onclick="submitRSVP()">Submit</button>

  <p id="msg"></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwNLwAgMXHpxkUDCBcKepvc6HSI9y0EofpFJoZow_oZEMZEaHP31mZ3_bfm-QEsDSpy/exec";

function submitRSVP() {
  const name = document.getElementById("name").value;
  const pax = document.getElementById("pax").value;
  const status = document.getElementById("status").value;

  if (!name || !pax) {
    document.getElementById("msg").innerText = "Please fill all fields";
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      name: name,
      pax: pax,
      status: status
    })
  })
  .then(res => res.text())
  .then(res => {
    document.getElementById("msg").innerText = "RSVP submitted successfully!";
    document.getElementById("name").value = "";
    document.getElementById("pax").value = "";
  })
  .catch(err => {
    document.getElementById("msg").innerText = "Error submitting RSVP";
  });
}
</script>

</body>
</html>
